name: CI Register Service

on:
  push:
    paths: ['register-service/**', '.github/workflows/CI-register-service.yml']
  pull_request:
    branches: [main]
    paths: ['register-service/**']

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./register-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: register-service/package-lock.json

      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-memory-server
          key: mongodb-memory-server-${{ runner.os }}-${{ hashFiles('register-service/package-lock.json') }}
          restore-keys: |
            mongodb-memory-server-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --forceExit --coverage --coverageReporters=text-summary

      - name: Lint
        run: npm run lint

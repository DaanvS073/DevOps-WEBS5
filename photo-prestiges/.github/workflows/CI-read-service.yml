name: CI read-service

on:
  push:
    paths: ['read-service/**']
  pull_request:
    branches: [main]
    paths: ['read-service/**']

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./read-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: read-service/package-lock.json
      - run: npm ci
      - name: Run Tests with Coverage
        run: npm test -- --coverage --coverageReporters=text-summary
      - run: npm run lint

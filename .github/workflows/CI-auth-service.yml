name: CI Auth Service

on:
  push:
    paths:
      - "photo-prestiges/auth-service/**"
  pull_request:
    branches:
      - main
    paths:
      - "photo-prestiges/auth-service/**"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./photo-prestiges/auth-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: photo-prestiges/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Lint
        run: npm run lint
